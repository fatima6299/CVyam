databases:
  - name: cvyam-db
    plan: free
    databaseName: cvbuilder
    user: cvyam

services:
  - type: web
    name: cvyam-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cvyam-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: ADMIN_CODE
        sync: false
      - key: CORS_ORIGIN
        value: https://cv.onrender.com
      - key: PORT
        value: "4000"

  - type: web
    name: cv
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://cvyam-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
